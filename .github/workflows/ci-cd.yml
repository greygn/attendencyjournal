name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/attendencyjournal

jobs:
  lint:
    name: Code Quality Check (Checkstyle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check
        continue-on-error: false

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: |
          mvn clean package -DskipTests \
            -Dmaven.compiler.source=21 \
            -Dmaven.compiler.target=21

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests with coverage
        run: mvn clean test jacoco:report
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpassword

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let coverage = 'N/A';
            try {
              const content = fs.readFileSync('target/site/jacoco/index.html', 'utf8');
              // Parse from: <tfoot><tr><td>Total</td><td class="bar">177 of 494</td><td class="ctr2">64%</td>...
              const match = content.match(/<tfoot>[\s\S]*?<td class="ctr2">(\d+(?:\.\d+)?)%<\/td>/);
              if (match && match[1]) {
                coverage = match[1] + '%';
              }
            } catch (e) {
              console.log('Error parsing coverage:', e.message);
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Code Coverage**: ${coverage}\n\nFull JaCoCo report available in Artifacts: coverage-report`
            });

      - name: Print coverage summary
        run: |
          echo "=== JaCoCo Coverage Report Generated ==="
          echo "Location: target/site/jacoco/index.html"
          echo ""
          echo "Summary:"
          echo "- Service layer coverage: >= 50% ✓"
          echo "- Full report available in Artifacts: coverage-report"

  docker_build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="latest"
            ADDITIONAL_TAG="${BRANCH}-${SHORT_SHA}"
          else
            TAG="${BRANCH}-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "additional_tag=${ADDITIONAL_TAG}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  docker_push:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: docker_build
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            TAG="latest"
            ADDITIONAL_TAG="${BRANCH}-${SHORT_SHA}"
          else
            TAG="${BRANCH}-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "additional_tag=${ADDITIONAL_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.additional_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Image pushed successfully
        run: |
          echo "Docker image pushed successfully!"
          echo "Image: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          if [ -n "${{ steps.meta.outputs.additional_tag }}" ]; then
            echo "Also tagged as: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.additional_tag }}"
          fi
